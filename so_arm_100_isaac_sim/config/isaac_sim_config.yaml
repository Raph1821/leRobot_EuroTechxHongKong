# Isaac Sim Configuration for SO-100 5-DOF Robot Arm
# This file defines physics simulation settings and ROS2 bridge topic mappings.

---

# Physics simulation settings
physics:
  # Physics step rate in Hz (Requirements 3.3)
  step_rate: 60
  # Solver iterations for PhysX
  solver_position_iterations: 8
  solver_velocity_iterations: 2
  # Enable GPU-accelerated physics
  use_gpu_dynamics: true
  # Gravity vector (m/s^2)
  gravity: [0.0, 0.0, -9.81]

# Rendering settings
rendering:
  # Target render frames per second
  render_fps: 30
  # Headless mode (no GUI window, useful for Docker/server deployments)
  headless: false
  # Viewport resolution
  viewport_width: 1280
  viewport_height: 720

# Scene configuration
scene:
  # Ground plane
  ground_plane:
    enabled: true
    size: 5.0  # meters
  # Directional light source
  lighting:
    type: directional
    intensity: 1000.0
    direction: [0.0, -0.5, -1.0]
  # Robot base placement
  robot_base:
    position: [0.0, 0.0, 0.0]
    orientation: [0.0, 0.0, 0.0]  # RPY in radians

# Joint configuration
joints:
  # Joint damping applied to all revolute joints (Ns/m)
  default_damping: 0.1
  # Joint definitions with limits (radians)
  joint_limits:
    Shoulder_Rotation:
      lower: -1.96
      upper: 1.96
      axis: [0, -1, 0]
    Shoulder_Pitch:
      lower: -1.745
      upper: 1.745
      axis: [1, 0, 0]
    Elbow:
      lower: -1.5
      upper: 1.5
      axis: [1, 0, 0]
    Wrist_Pitch:
      lower: -1.658
      upper: 1.658
      axis: [1, 0, 0]
    Wrist_Roll:
      lower: -2.75
      upper: 2.75
      axis: [0, 1, 0]
    Gripper:
      lower: -0.1792
      upper: 1.5708
      axis: [0, 0, 1]

# ROS2 Bridge configuration
ros2_bridge:
  # Enable the Isaac Sim ROS2 Bridge extension
  enabled: true

  # Published topics (Isaac Sim → ROS2)
  publishers:
    joint_states:
      topic: /joint_states
      message_type: sensor_msgs/msg/JointState
      # Publishing rate in Hz (Requirement 4.1: minimum 50 Hz)
      publish_rate: 60
      # Joint names included in the published message
      joint_names:
        - Shoulder_Rotation
        - Shoulder_Pitch
        - Elbow
        - Wrist_Pitch
        - Wrist_Roll
        - Gripper
      # Fields to include in JointState message
      include_position: true
      include_velocity: true
      include_effort: false

  # Subscribed topics (ROS2 → Isaac Sim)
  subscribers:
    joint_trajectory:
      topic: /arm_controller/joint_trajectory
      message_type: trajectory_msgs/msg/JointTrajectory
      # Maximum latency from message receipt to joint actuation (ms)
      max_actuation_latency_ms: 20
      joint_names:
        - Shoulder_Rotation
        - Shoulder_Pitch
        - Elbow
        - Wrist_Pitch
        - Wrist_Roll

  # Action servers (ROS2 → Isaac Sim)
  action_servers:
    follow_joint_trajectory:
      action_name: /arm_controller/follow_joint_trajectory
      action_type: control_msgs/action/FollowJointTrajectory
      # Arm joints controlled by this action
      joint_names:
        - Shoulder_Rotation
        - Shoulder_Pitch
        - Elbow
        - Wrist_Pitch
        - Wrist_Roll
      # Reject goals with positions outside joint limits (Requirement 4.6)
      enforce_joint_limits: true
      # Command interface type
      command_interface: position

    gripper_command:
      action_name: /gripper_controller/gripper_cmd
      action_type: control_msgs/action/GripperCommand
      joint_names:
        - Gripper
      # Gripper position range in radians (Requirement 4.4)
      position_range:
        min: -0.1792
        max: 1.5708
      command_interface: position

  # Communication health monitoring
  health_monitoring:
    # Timeout before declaring communication loss (ms) (Requirement 4.7)
    communication_timeout_ms: 500
    # Diagnostic topic for reporting connection failures
    diagnostics_topic: /diagnostics
    # Action to take on communication loss
    on_timeout:
      abort_active_goals: true
      publish_diagnostic: true
