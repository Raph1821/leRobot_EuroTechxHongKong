# colcon defaults for the SO-100 Unified Project
#
# This file configures colcon to build all Humble-overlay packages
# when 'colcon build' is invoked from the workspace root.
#
# The packages are located at the repository root and are expected
# to be symlinked into workspaces/humble_ws/src/ via setup_sources.bash.
#
# For full overlay builds:
#   cd workspaces/humble_ws && source setup_overlay.bash && colcon build --symlink-install
#   cd workspaces/jazzy_ws && source setup_overlay.bash && colcon build --symlink-install
#
# For a root-level build (Humble packages only):
#   colcon build --symlink-install

build:
  symlink-install: true
  packages-up-to:
    - so_arm_100
    - so_arm_100_description
    - so_arm_100_bringup
    - so_arm_100_moveit_config
    - so_arm_100_isaac_sim
    - so_arm_100_web_bridge
