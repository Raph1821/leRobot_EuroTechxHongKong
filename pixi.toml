[project]
name = "so100-unified-workspace"
version = "0.1.0"
description = "Unified workspace for SO-100 robot arm: Isaac Sim simulation, ROS2 control, and web interface"
channels = ["conda-forge", "robostack-staging"]
platforms = ["linux-64"]

# Default environment: Rerun visualization bridge
[environments]
default = { solve-group = "default" }
lerobot = { features = ["lerobot"], solve-group = "lerobot" }
simulation = { features = ["simulation"], solve-group = "simulation" }

# ─────────────────────────────────────────────────────────────────
# Default environment dependencies (visualization with Rerun)
# ─────────────────────────────────────────────────────────────────
[dependencies]
python = ">=3.10"
numpy = ">=1.24"
rerun-sdk = ">=0.16"

# ─────────────────────────────────────────────────────────────────
# LeRobot environment (AI inference)
# ─────────────────────────────────────────────────────────────────
[feature.lerobot.dependencies]
python = ">=3.10"
numpy = ">=1.24"

[feature.lerobot.pypi-dependencies]
lerobot = "*"

# ─────────────────────────────────────────────────────────────────
# Simulation environment (Isaac Sim ROS2 bridge)
# ─────────────────────────────────────────────────────────────────
[feature.simulation.dependencies]
python = ">=3.10"
numpy = ">=1.24"

[feature.simulation.pypi-dependencies]
isaacsim = ">=4.0"
isaacsim-ros2-bridge = "*"

# ─────────────────────────────────────────────────────────────────
# Tasks for building the colcon workspaces
# ─────────────────────────────────────────────────────────────────
[tasks]
# Build the Humble overlay workspace (SO-100-arm packages)
build-humble = { cmd = "cd workspaces/humble_ws && colcon build --symlink-install", description = "Build Humble overlay workspace (SO-100-arm packages)" }

# Build the Jazzy overlay workspace (so101 packages)
build-jazzy = { cmd = "cd workspaces/jazzy_ws && colcon build --symlink-install", description = "Build Jazzy overlay workspace (so101 packages)" }

# Build all workspaces
build-all = { depends-on = ["build-humble", "build-jazzy"], description = "Build all colcon overlay workspaces" }

# Source the Humble overlay
source-humble = { cmd = "source workspaces/humble_ws/install/setup.bash", description = "Source Humble overlay workspace" }

# Source the Jazzy overlay
source-jazzy = { cmd = "source workspaces/jazzy_ws/install/setup.bash", description = "Source Jazzy overlay workspace" }
