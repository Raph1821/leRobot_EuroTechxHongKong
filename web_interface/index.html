<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SO-100 Robot Arm Control</title>
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body>
    <div id="app">
      <header id="status-bar">
        <h1>SO-100 Web Control</h1>
        <div id="status-display"></div>
      </header>
      <main id="main-content">
        <!-- Left column: 3D viewer + camera stream -->
        <div id="viewer-column">
          <div id="viewer-container">
            <!-- 3D viewer canvas is appended here by SceneSetup -->
          </div>
          <section id="camera-stream-panel">
            <!-- Camera stream panel rendered by CameraStreamPanel -->
          </section>
        </div>

        <!-- Center control panel: robot selector + joint/Cartesian/teleop controls -->
        <aside id="control-panel">
          <section id="robot-selector">
            <!-- Robot namespace selector rendered by RobotSelector -->
          </section>
          <section id="joint-controls">
            <h2>Joint Controls</h2>
            <!-- Joint sliders rendered by JointControlPanel -->
          </section>
          <section id="gripper-control">
            <h2>Gripper</h2>
            <!-- Gripper control rendered by GripperControl -->
          </section>
          <section id="home-section">
            <!-- Home button rendered by HomeButton -->
          </section>
          <section id="cartesian-control-panel">
            <!-- Cartesian control panel rendered by CartesianControlPanel -->
          </section>
          <section id="teleop-panel">
            <!-- Teleoperation panel rendered by TeleopPanel -->
          </section>
          <section id="pose-manager">
            <h2>Poses</h2>
            <!-- Pose manager rendered by PoseManager -->
          </section>
        </aside>

        <!-- Right column: spawning + episode recording -->
        <aside id="secondary-panel">
          <section id="spawn-panel">
            <!-- Object spawn panel rendered by SpawnPanel -->
          </section>
          <section id="episode-panel">
            <!-- Episode recording panel rendered by EpisodePanel -->
          </section>
        </aside>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
